<svg width="950" height="250" viewBox="0 0 950 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="frameStroke" x1="0" y1="0" x2="950" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#30363d"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#7dd3fc" opacity="0.05"/>
    </pattern>
    <!-- typing wipes -->
    <clipPath id="type1">
      <rect x="36" y="58" width="0" height="22">
        <animate attributeName="width" from="0" to="70" begin="0.5s" dur="0.7s" calcMode="linear" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="type2">
      <rect x="36" y="136" width="0" height="22">
        <animate attributeName="width" from="0" to="364" begin="2.4s" dur="1.1s" calcMode="linear" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- terminal window -->
  <rect x="1.5" y="1.5" width="947" height="247" rx="12" fill="#0d1117"/>
  <rect x="1.5" y="1.5" width="947" height="247" rx="12" stroke="url(#frameStroke)" stroke-width="1.5"/>

  <!-- title bar -->
  <path d="M1.5 13.5 A12 12 0 0 1 13.5 1.5 H936.5 A12 12 0 0 1 948.5 13.5 V36 H1.5 Z" fill="#161b22"/>
  <line x1="1.5" y1="36" x2="948.5" y2="36" stroke="#30363d" stroke-width="1"/>
  <circle cx="24" cy="19" r="5.5" fill="#f85149"/>
  <circle cx="44" cy="19" r="5.5" fill="#d29922"/>
  <circle cx="64" cy="19" r="5.5" fill="#3fb950"/>
  <text x="475" y="24" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" font-size="13" fill="#8b949e">divyansh@void: ~</text>

  <!-- session -->
  <g font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" font-size="14">

    <!-- $ whoami -->
    <g clip-path="url(#type1)">
      <text x="36" y="74" textLength="68"><tspan fill="#22d3ee">$</tspan><tspan fill="#e6edf3" dx="6">whoami</tspan></text>
    </g>
    <text x="36" y="100" fill="#7dd3fc" filter="url(#glow)" opacity="0">
      Divyansh Gupta — security engineer · full-stack developer · blockchain auditor
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    </text>

    <!-- $ ./recon -->
    <g clip-path="url(#type2)">
      <text x="36" y="152" textLength="362"><tspan fill="#22d3ee">$</tspan><tspan fill="#e6edf3" dx="6">./recon --target everything --depth=full</tspan></text>
    </g>
    <text x="36" y="178" fill="#8b949e" opacity="0">
      <tspan fill="#3fb950">[+]</tspan> web · blockchain · AI systems — mapped, exploited, hardened
      <animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.5s" fill="freeze"/>
    </text>
    <text x="36" y="202" fill="#8b949e" opacity="0">
      <tspan fill="#22d3ee">[✓]</tspan> reports generated — declassified case files below
      <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.5s" fill="freeze"/>
    </text>

    <!-- idle prompt + blinking cursor -->
    <text x="36" y="230" fill="#22d3ee" opacity="0">$
      <animate attributeName="opacity" from="0" to="1" begin="5.4s" dur="0.3s" fill="freeze"/>
    </text>
    <rect x="52" y="218" width="9" height="16" fill="#22d3ee" filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0;1" keyTimes="0;0.76;0.78;0.88;0.9;0.98;1" dur="7.1s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1.1s" begin="7.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- scanlines -->
  <rect x="1.5" y="37" width="947" height="211" fill="url(#scan)"/>
</svg>
